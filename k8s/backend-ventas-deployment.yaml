apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-ventas

  # namespace del proyecto
  namespace: innovatech

spec:

  # replicas iniciales
  replicas: 2

  selector:
    matchLabels:
      app: backend-ventas

  template:
    metadata:
      labels:
        app: backend-ventas

    spec:
      containers:

      - name: backend-ventas

        # imagen ECR
        image: 694766583274.dkr.ecr.us-east-1.amazonaws.com/backend-ventas:latest

        imagePullPolicy: Always

        ports:

        # puerto spring boot
        - containerPort: 8080

        env:

        # endpoint rds
        - name: DB_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: rds-secret
              key: DB_ENDPOINT

        # puerto rds
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: rds-secret
              key: DB_PORT

        # nombre bd
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: rds-secret
              key: DB_NAME

        # usuario bd
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: rds-secret
              key: DB_USERNAME

        # password bd
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rds-secret
              key: DB_PASSWORD