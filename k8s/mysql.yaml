apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: innovatech
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: root123
        - name: MYSQL_DATABASE
          value: innovatech
        volumeMounts:
        - mountPath: /var/lib/mysql
          name: mysql-storage
      volumes:
      - name: mysql-storage
        emptyDir: {}   # ← sin PVC, almacenamiento temporal

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: innovatech
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP